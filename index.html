<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Data Stories</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCAzMiAzMiI+PGNpcmNsZSBjeD0iMTYiIGN5PSIxNiIgcj0iMTUiIGZpbGw9IiNFOTQ1NjAiLz48cGF0aCBmaWxsPSIjMUExQTJFIiBkPSJNOCAxMmgxNnYySDh6TTggMTZoMTJ2Mkg4ek04IDIwaDh2Mkg4eiIvPjwvc3ZnPg==" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0F0F1A;
      --bg-card: #1A1A2E;
      --text: #E0E0E0;
      --text-muted: #8888AA;
      --accent: #E94560;
      --accent2: #0F3460;
      --border: #2A2A4A;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }
    .container { max-width: 1100px; margin: 0 auto; padding: 0 1.5rem; }
    header {
      padding: 3rem 0 2rem;
      border-bottom: 1px solid var(--border);
      margin-bottom: 2.5rem;
    }
    h1 {
      font-size: 2.5rem;
      font-weight: 700;
      letter-spacing: -0.03em;
      background: linear-gradient(135deg, var(--accent) 0%, #FF6B6B 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .subtitle {
      color: var(--text-muted);
      font-size: 1.05rem;
      margin-top: 0.4rem;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 1.5rem;
      padding-bottom: 4rem;
    }
    .card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 10px;
      overflow: hidden;
      text-decoration: none;
      color: inherit;
      transition: transform 0.2s ease, border-color 0.2s ease, box-shadow 0.2s ease;
      display: flex;
      flex-direction: column;
    }
    .card:hover {
      transform: translateY(-3px);
      border-color: var(--accent);
      box-shadow: 0 8px 30px rgba(233, 69, 96, 0.1);
    }
    .card img {
      width: 100%;
      height: 190px;
      object-fit: cover;
      background: var(--accent2);
      transition: transform 0.3s ease;
    }
    .card:hover img { transform: scale(1.03); }
    .card-body {
      padding: 1.2rem;
      display: flex;
      flex-direction: column;
      flex: 1;
    }
    .card-title {
      font-size: 1.1rem;
      font-weight: 600;
      line-height: 1.3;
      margin-bottom: 0.5rem;
    }
    .card-meta {
      display: flex;
      gap: 0.75rem;
      font-size: 0.8rem;
      color: var(--text-muted);
      margin-bottom: 0.6rem;
    }
    .card-meta .folder {
      font-family: 'SF Mono', 'Fira Code', monospace;
      color: var(--accent);
      opacity: 0.7;
    }
    .card-desc {
      font-size: 0.9rem;
      color: var(--text-muted);
      line-height: 1.5;
      flex: 1;
    }
    footer {
      border-top: 1px solid var(--border);
      padding: 1.5rem 0;
      text-align: center;
      color: var(--text-muted);
      font-size: 0.8rem;
    }
    footer a { color: var(--accent); text-decoration: none; }
    @media (max-width: 600px) {
      h1 { font-size: 1.8rem; }
      .grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>Data Stories</h1>
      <p class="subtitle">Visualizations and narratives from public datasets</p>
    </header>
    <div id="stories" class="grid"></div>
  </div>
  <footer>
    <div class="container">
      <a href="https://sunil-dhaka.github.io/">blog</a> &middot;
      <a href="https://github.com/sunil-dhaka/datastories">source</a>
    </div>
  </footer>
  <script src="script.js"></script>
</body>
</html>
